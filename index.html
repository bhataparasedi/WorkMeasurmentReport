<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AMBUJA Foundation Work System</title>

<style>

/* ===== BACKGROUND (RESTORED) ===== */
body {
    font-family: Arial;
    margin: 0;
    background: linear-gradient(135deg, #f1f5f9, #cbd5e1);	
}

/* ===== HEADER ===== */
.header {
    background: rgba(255,255,255,0.9);
    color: #1e3a8a;
    padding: 15px;
    text-align: center;
    border-bottom: 2px solid #1e3a8a;
}

/* ===== CONTAINER ===== */
.container {
    max-width: 950px;
    margin: auto;
    padding: 15px;
}

/* ===== GLASS CARD ===== */
.card {
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(15px);
    border-radius: 15px;
    border: 1px solid rgba(255,255,255,0.2);
    padding: 20px;
    margin-bottom: 15px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.2);
}

/* ===== GRID FIX (NO OVERFLOW) ===== */
.grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
}

@media (max-width: 700px) {
    .grid {
        grid-template-columns: 1fr;
    }
}

/* ===== INPUT FIX ===== */
.input-box {
    margin-bottom: 12px;
}

input, select {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: none;
    outline: none;
    background: rgba(255,255,255,0.9);
    box-sizing: border-box;
}

/* ===== BUTTONS ===== */
button {
    padding: 10px 15px;
    margin: 5px;
    border: none;
    color: white;
    border-radius: 8px;
    cursor: pointer;
}

.add { background: #16a34a; }
.clear { background: #dc2626; }
.copy { background: #7c3aed; }
.download { background: #2563eb; }
.print { background: #f59e0b; }

button:hover {
    transform: scale(1.05);
}

/* ===== TABLE ===== */
table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
    background: rgba(255,255,255,0.2);
}

th {
    background: rgba(30,58,138,0.9);
    color: white;
}

th, td {
    border: 1px solid rgba(255,255,255,0.3);
    padding: 6px;
    text-align: center;
}

/* ===== PRINT ===== */
@page {
    size: A4;
    margin: 10mm;
}

@media print {

    body * {
        visibility: hidden;
    }

    #tableArea, #tableArea * {
        visibility: visible;
    }

    #tableArea {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
    }

    table {
        width: 100%;
        font-size: 11px;
        background: white;
    }

    th, td {
        border: 1px solid black;
        padding: 4px;
    }

    #credit {
        visibility: visible;
        position: fixed;
        bottom: 5mm;
        right: 10mm;
        font-size: 10px;
    }
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header" style="display:flex; align-items:center; justify-content:center; gap:15px; flex-wrap:wrap; text-align:center;">

<!-- Logo -->
<img src="https://media.licdn.com/dms/image/v2/D4D0BAQGxVaK1Jl_LAA/company-logo_200_200/company-logo_200_200/0/1715755178720/ambuja_foundation_logo?e=2147483647&v=beta&t=_p4bfAX0L-JS_vWOmnk-eE4GEv70zhiNCqL8N5z_WT0" 
alt="Ambuja Foundation Logo"
style="height:80px; background:white; padding:5px; border-radius:6px;">

<!-- Text -->
<div>
<h2 style="margin:0; font-size:23px; letter-spacing:1px;">AMBUJA FOUNDATION</h2>
<div style="font-size:16px;">Work Measurement Report</div>
<div id="date" style="font-size:14px;"></div>
</div>

</div>

</div>

<div class="container">

<!-- FORM -->
<div class="card">

<div class="grid">

<input id="sr" readonly placeholder="Sr.No">
<input id="village" placeholder="Village">
<input id="vendor" placeholder="Vendor Name">

<select id="nature">
<option value="">Select Nature of Work</option>
<option>Farm Pond</option>
<option>Doha Model</option>
</select>

<input id="l" type="number" min="0" step="any" placeholder="Length (m)">
<input id="w" type="number" min="0" step="any" placeholder="Width (m)">
<input id="h" type="number" min="0" step="any" placeholder="Height (m)">
<input id="q" type="number" min="0" step="1" placeholder="Quantity">
<input id="r" type="number" min="0" step="any" placeholder="Rate">

</div>

<div style="margin-top:10px;">
<button class="add" onclick="addEntry()">Add Entry</button>
<button class="clear" onclick="clearForm()">Clear</button>
</div>

</div>

<!-- TABLE -->
<div class="card" id="tableArea"></div>

<div style="text-align:center;">
<button class="copy" onclick="copyTable()">Copy</button>
<button class="download" onclick="downloadCSV()">Download</button>
<button class="print" onclick="window.print()">Print</button>
</div>

<div id="credit" style="text-align:right; margin-top:10px; font-size:12px; color:#000000;">
Created by: <b>Vikash Verma</b>
</div>

</div>

<script>

document.getElementById("date").innerText =
"Date: " + new Date().toLocaleDateString();

let data = [];
document.getElementById("sr").value = 1;

/* ===== ADD ENTRY ===== */
function addEntry(){

let sr = data.length + 1;
let village = document.getElementById("village").value;
let vendor = document.getElementById("vendor").value;
let nature = document.getElementById("nature").value;

let l = +document.getElementById("l").value;
let w = +document.getElementById("w").value;
let h = +document.getElementById("h").value;
let q = +document.getElementById("q").value;
let r = +document.getElementById("r").value;

if(!village || !vendor || !nature || !l || !w || !h || !q || !r){
alert("⚠️ Please fill all fields");
return;
}

let volume = (l*w*h).toFixed(2);
let scope = (volume*q).toFixed(2);
let amount = (scope*r).toFixed(2);

data.push({
sr,village,vendor,nature,l,w,h,
volume,q,scope,r,amount
});

renderTable();
clearForm();
}

/* ===== TABLE ===== */
function renderTable(){

let html = `<table>
<tr>
<th>Sr</th><th>Village</th><th>Vendor</th><th>Nature</th>
<th>L</th><th>W</th><th>H</th>
<th>Volume</th><th>Qty</th><th>Scope</th><th>Rate</th><th>Amount</th>
</tr>`;

data.forEach(d=>{
html += `<tr>
<td>${d.sr}</td>
<td>${d.village}</td>
<td>${d.vendor}</td>
<td>${d.nature}</td>
<td>${d.l}</td>
<td>${d.w}</td>
<td>${d.h}</td>
<td>${d.volume}</td>
<td>${d.q}</td>
<td>${d.scope}</td>
<td>${d.r}</td>
<td>${d.amount}</td>
</tr>`;
});

html += "</table>";
document.getElementById("tableArea").innerHTML = html;
}

/* ===== CLEAR ===== */
function clearForm(){
document.getElementById("sr").value = data.length + 1;
["village","vendor","nature","l","w","h","q","r"].forEach(id=>{
document.getElementById(id).value="";
});
}

/* ===== COPY ===== */
function copyTable(){
let table = document.getElementById("tableArea");
let range = document.createRange();
range.selectNode(table);
window.getSelection().removeAllRanges();
window.getSelection().addRange(range);
document.execCommand("copy");
alert("Copied!");
}

/* ===== CSV ===== */
function downloadCSV(){
let csv="Sr,Village,Vendor,Nature,L,W,H,Volume,Qty,Scope,Rate,Amount\n";
data.forEach(d=>{
csv+=`${d.sr},${d.village},${d.vendor},${d.nature},${d.l},${d.w},${d.h},${d.volume},${d.q},${d.scope},${d.r},${d.amount}\n`;
});
let blob=new Blob([csv],{type:"text/csv"});
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="report.csv";
a.click();
}

</script>

</body>
</html>
